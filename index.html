    <div class="card" id="card">
      <div class="icon">🎸</div>
      <h1 id="title">Checking Invite...</h1>
      <p id="message">Please wait while we verify your invitation.</p>
      <a id="action-btn" href="#" class="btn" style="display: none;">Open in App</a>
      <button id="login-btn" class="btn btn-secondary" style="display: none;" onclick="loginWithGoogle()">Login to Register</button>
      <div class="footer" id="footer">Don't have the app? Download it from the store first.</div>
    </div>

    <script>
      // CONFIGURATION
      const SUPABASE_URL = 'https://uqpjlqonxueqxprnyueq.supabase.co';
      const SUPABASE_ANON_KEY = 'sb_publishable_potjA5ybNYlBBwqasu3MfA_lQTIFj0F';
      const APP_SCHEME = 'bands-schedule';
      
      let supabaseClient;

      async function init() {
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const card = document.getElementById('card');
        const title = document.getElementById('title');
        const message = document.getElementById('message');
        const btn = document.getElementById('action-btn');
        const loginBtn = document.getElementById('login-btn');

        // Fade in
        requestAnimationFrame(() => card.style.opacity = '1');

        // Init Supabase
        const { createClient } = supabase;
        supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Check if coming back from login
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
          showSuccess("Registered!", "You're now registered. Download the app to manage your schedule!");
          return;
        }

        if (!token) {
          showError("Band Schedule", "Connect with your band members and manage your schedule effortlessly.");
          loginBtn.style.display = 'block';
          return;
        }

        // Call the Secure RPC
        const {data, error} = await supabaseClient.rpc('get_invite_details', {
          token_input: token
        });

        if (error || !data) {
          console.error(error);
          showError("Invite Not Found", "This invitation code does not exist.");
          return;
        }

        if (!data.is_valid) {
          showError("Expired", "This invitation has expired.");
          return;
        }

        // Success! Render the Band Name
        document.title = `Join ${data.band_name}`;
        title.innerText = `Join ${data.band_name}`;
        message.innerHTML = `You've been invited to join the band on
        <b>BandSchedule</b>. Tap below to coordinate the rhythm.`;
        
        // Set Deep Link
        btn.href = `${APP_SCHEME}://join/${token}`;
        btn.style.display = 'block';
        loginBtn.style.display = 'block';

        // Auto-redirect on mobile
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
          setTimeout(() => {
            window.location.href = btn.href;
          }, 1000);
        }
      }

      async function loginWithGoogle() {
        const { error } = await supabaseClient.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: window.location.origin + window.location.pathname
          }
        });
        if (error) alert(error.message);
      }

      function showSuccess(head, text) {
        document.getElementById('title').innerText = head;
        document.getElementById('message').innerText = text;
        document.getElementById('action-btn').style.display = 'none';
        document.getElementById('login-btn').style.display = 'none';
      }

      function showError(head, text) {
        document.getElementById('title').innerText = head;
        document.getElementById('message').innerText = text;
        document.getElementById('action-btn').style.display = 'none';
      }

      init();
    </script>
</body>

</html>

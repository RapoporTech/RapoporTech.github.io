<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Band Schedule - Join the Rhythm</title>
  <style>
    body {
      background-color: #0F172A;
      color: #F8FAFC;
      font-family: -apple-system, system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }

    .card {
      background-color: #1E293B;
      padding: 40px;
      border-radius: 24px;
      max-width: 400px;
      width: 85%;
      border: 1px solid #334155;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
      opacity: 0;
      transition: opacity 0.5s;
    }

    .icon {
      font-size: 56px;
      margin-bottom: 24px;
    }

    h1 {
      color: #818CF8;
      margin: 0 0 12px;
      font-size: 28px;
      font-weight: 800;
    }

    p {
      color: #94A3B8;
      margin: 0 0 32px;
      font-size: 16px;
      line-height: 1.5;
    }

    .btn {
      background-color: #818CF8;
      color: #0F172A;
      padding: 18px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      display: block;
      font-size: 16px;
      transition: 0.2s ease;
      cursor: pointer;
      border: none;
      width: 100%;
      margin-bottom: 12px;
    }

    .btn:hover {
      background-color: #6366F1;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background-color: transparent;
      color: #818CF8;
      border: 2px solid #818CF8;
    }

    .btn-secondary:hover {
      background-color: rgba(129, 140, 248, 0.1);
    }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #475569;
    }

    .error {
      color: #F87171;
    }

    #loading-spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border-left-color: #818CF8;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <div class="card" id="card">
    <div id="loading-area">
      <div id="loading-spinner"></div>
      <p>Syncing your rhythm...</p>
    </div>

    <div id="main-content" style="display: none;">
      <div class="icon" id="main-icon">🎸</div>
      <h1 id="title">Band Schedule</h1>
      <p id="message"></p>
      
      <a id="action-btn" href="#" class="btn" style="display: none;">Open in App</a>
      <button id="login-btn" class="btn btn-secondary" style="display: none;" onclick="loginWithGoogle()">Login to Register & Join</button>
      
      <div class="footer" id="footer">Coordinate your band's schedule effortlessly.</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://uqpjlqonxueqxprnyueq.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_potjA5ybNYlBBwqasu3MfA_lQTIFj0F';
    const APP_SCHEME = 'bands-schedule';
    
    let supabaseClient;

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const card = document.getElementById('card');
      const title = document.getElementById('title');
      const message = document.getElementById('message');
      const btn = document.getElementById('action-btn');
      const loginBtn = document.getElementById('login-btn');
      const loadingArea = document.getElementById('loading-area');
      const mainContent = document.getElementById('main-content');

      // Fade in card
      requestAnimationFrame(() => card.style.opacity = '1');

      const { createClient } = supabase;
      supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // 1. Handle Auth State
      const { data: { session } } = await supabaseClient.auth.getSession();
      
      if (session && token) {
        // USER IS LOGGED IN AND HAS A TOKEN - JOIN THE BAND
        const user = session.user;
        
        try {
          // A. Update Profile
          await supabaseClient.from('profiles').upsert({
            id: user.id,
            name: user.user_metadata.full_name || 'New Member'
          });

          // B. Get Band Details (to get band_id)
          const { data: bandData } = await supabaseClient.rpc('get_invite_details', {
            token_input: token
          });

          if (bandData && bandData.is_valid) {
            // C. Add to band_members
            await supabaseClient.from('band_members').upsert({
              band_id: bandData.band_id,
              profile_id: user.id,
              is_admin: false
            });
            
            showUI("🤘 Registered & Joined!", `You've successfully joined <b>${bandData.band_name}</b>! Now open the app to see the schedule.`);
          } else {
            showUI("Logged In", "You're registered, but the invitation link is invalid or expired.");
          }
        } catch (e) {
          console.error("Join error:", e);
          showUI("Error", "Something went wrong while joining the band, but you are registered!");
        }
        return;
      } else if (session) {
        // Logged in but no token
        showUI("Welcome!", "You are registered with Band Schedule. Download the app to get started!");
        return;
      }

      // 2. Not logged in - Show Invitation
      if (!token) {
        showUI("Band Schedule", "The ultimate coordination tool for bands.");
        loginBtn.style.display = 'block';
        return;
      }

      const { data, error } = await supabaseClient.rpc('get_invite_details', {
        token_input: token
      });

      if (error || !data || !data.is_valid) {
        showUI("Invite Not Found", "This invitation link is invalid or has expired.", true);
        loginBtn.style.display = 'block';
        return;
      }

      // Success UI for Guest
      document.title = `Join ${data.band_name}`;
      showUI(`Join ${data.band_name}`, `You've been invited to join <b>${data.band_name}</b>.<br><br>Open the app if you have it, or login to join via web.`);
      
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      if (isMobile) {
        btn.href = `${APP_SCHEME}://join/${token}`;
        btn.style.display = 'block';
      }
      loginBtn.style.display = 'block';
    }

    async function loginWithGoogle() {
      // CRITICAL: We pass the full current URL as the redirect so we don't lose the token!
      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'google',
        options: { 
          redirectTo: window.location.href 
        }
      });
      if (error) alert(error.message);
    }

    function showUI(head, text, isError = false) {
      document.getElementById('loading-area').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
      document.getElementById('title').innerText = head;
      if (isError) document.getElementById('title').classList.add('error');
      document.getElementById('message').innerHTML = text;
    }

    init();
  </script>
</body>
</html>
